<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>winder</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background-image: url('winderbackground1.png');
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #2b3d3b;

    position: relative;
}

/* main photo */
.main-photo {
    position: absolute;

    width: 31.5vw;
    height: 72vh;

    top: 50.7%;
    left: 50%;

    transform: translate(-50%, -50%);

    object-fit: contain;

    z-index: 2;

    transition: 0.3s;
}
.info-photo {
    position: absolute;

    width: 31.5vw;
    height: 72vh;

    top: 50.7%;
    left: 50%;

    transform: translate(-50%, -50%) scale(0.95);

    object-fit: contain;

    z-index: 1;

    opacity: 0;
    transition: 0.4s;
}
.spin-photo {
    position: absolute;

    width: 120px;
    height: auto;

    z-index: 3;

    transition: transform 0.6s ease;
}

/* temporary positions */
/* you can change these later */

.poppy {
    top: 10%;
    left: 35%;
}

.cookies {
    bottom: 10%;
    right: 17%;
}
.arrow-button {
    position: absolute;

    width: 100px;
    height: auto;

    z-index: 10;

    cursor: pointer;

    transition: 0.2s;
}

/* hover effect */
.arrow-button:hover {
    transform: translateY(-50%) scale(1.1);
}

/* positions */

.left-button {
    left: 3%;
    top: 50%;

    transform: translateY(-50%);
}

.right-button {
    right: 3%;
    top: 50%;

    transform: translateY(-50%);
}
.home-icon {
    width: 125px;

    position: fixed;

    top: 30px;
    left: 30px;

    z-index: 6;

    cursor: pointer;

    transition: transform 0.2s ease;
}

.home-icon:hover {
    transform: scale(1.1);
}

</style>
</head>

<body>

<!-- Main Photo -->
<img class="main-photo" id="mainPhoto" src="winderwoman1.png" alt="Photo">
<img class="info-photo" id="infoPhoto" src="winderwoman1info.png" alt="Info">

<!-- Decorations -->
<img class="spin-photo poppy" id="poppy" src="winderpoppy.png" alt="Poppy">
<img class="spin-photo cookies" id="cookies" src="windercookies.png" alt="Cookies">


<!-- Arrow Buttons -->
<img class="arrow-button left-button" id="leftButton" src="winderleft.png" alt="Left">
<img class="arrow-button right-button" id="rightButton" src="winderright.png" alt="Right">

<!-- Home Icon -->
<a href="index.html">
    <img class="home-icon" src="winderhome.png" alt="Home">
</a>

<script>
const photos = [
    "winderwoman1.png",
    "winderwoman2.png",
    "winderwoman3.png"
];

let currentPhoto = 0;
let infoOpen = false;

const mainPhoto = document.getElementById("mainPhoto");
const infoPhoto = document.getElementById("infoPhoto");
const poppy = document.getElementById("poppy");
const cookies = document.getElementById("cookies");
const leftButton = document.getElementById("leftButton");
const rightButton = document.getElementById("rightButton");

let spinRotation = 0;

/* hide info on startup */
infoPhoto.style.opacity = "0";

document.addEventListener("keydown", (event) => {

    /* LEFT ARROW */
    if (event.key === "ArrowLeft") {

        /* IF INFO IS OPEN -> CLOSE IT */
        if (infoOpen) {

            mainPhoto.style.transition = "0.4s";
            mainPhoto.style.transform =
                "translate(-50%, -50%)";

            infoPhoto.style.transition = "0.4s";
            infoPhoto.style.opacity = "0";

            infoPhoto.style.transform =
                "translate(-50%, -50%) scale(0.95)";

            infoOpen = false;

        } else {

            /* NORMAL PHOTO SWIPE */

            mainPhoto.style.transition = "0.4s";
            mainPhoto.style.transform =
                "translate(-150%, -50%)";

            /* spin decorations */
            spinRotation += 360;

            poppy.style.transform =
                `rotate(${spinRotation}deg)`;

            cookies.style.transform =
                `rotate(${spinRotation}deg)`;

            setTimeout(() => {

                currentPhoto++;

                if (currentPhoto >= photos.length) {
                    currentPhoto = 0;
                }

                /* move instantly to right */
                mainPhoto.style.transition = "0s";

                mainPhoto.src = photos[currentPhoto];

                mainPhoto.style.transform =
                    "translate(50%, -50%)";

                setTimeout(() => {

                    /* slide into centre */
                    mainPhoto.style.transition = "0.4s";

                    mainPhoto.style.transform =
                        "translate(-35%, -50%)";

                }, 20);

            }, 400);
        }
    }

    /* RIGHT ARROW */
    if (event.key === "ArrowRight") {

        /* only open if not already open */
        if (!infoOpen) {

            /* move woman slightly right */
            mainPhoto.style.transition = "0.4s";

            mainPhoto.style.transform =
                "translate(-100%, -50%)";

            /* matching info image */
            infoPhoto.src =
                photos[currentPhoto].replace(".png", "info.png");

            /* show info */
            infoPhoto.style.transition = "0.4s";

            infoPhoto.style.opacity = "1";

            infoPhoto.style.transform =
                "translate(-0%, -50%) scale(1)";

            infoOpen = true;
        }
    }
});
/* LEFT BUTTON */
leftButton.addEventListener("click", () => {

    document.dispatchEvent(
        new KeyboardEvent("keydown", {
            key: "ArrowLeft"
        })
    );

});

/* RIGHT BUTTON */
rightButton.addEventListener("click", () => {

    document.dispatchEvent(
        new KeyboardEvent("keydown", {
            key: "ArrowRight"
        })
    );

});
</script>

</body>
</html>
